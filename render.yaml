services:
  - type: pserv
    name: dashboard-energie-mysql
    runtime: docker
    repo: https://github.com/render-examples/mysql.git
    plan: starter
    autoDeploy: false
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
    envVars:
      - key: MYSQL_DATABASE
        value: smen_italcar
      - key: MYSQL_USER
        value: smen_user
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_ROOT_PASSWORD
        sync: false
      - key: MYSQL_ROOT_HOST
        value: "%"

  - type: web
    name: dashboard-energie-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT server:app
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_ORIGIN
        sync: false
      - key: MYSQL_HOST
        fromService:
          type: pserv
          name: dashboard-energie-mysql
          property: host
      - key: MYSQL_PORT
        fromService:
          type: pserv
          name: dashboard-energie-mysql
          property: port
      - key: MYSQL_USER
        value: smen_user
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        value: smen_italcar
      - key: LEGACY_FALLBACK_ENABLED
        value: "false"
